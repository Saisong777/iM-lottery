<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IM 行動教會 · 管理後台</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #FFD700; --gold-dim: #B8860B; --gold-pale: #FFF5CC;
  --red: #C0392B; --red-hi: #E74C3C;
  --bg: #080810; --bg2: #10101A; --bg3: #181824;
  --text: #F0E6D0; --muted: #7A6A50;
  --green: #2ECC71;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Noto Serif TC', serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
  display: flex; flex-direction: column; align-items: center;
}
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 60% 50% at 10% 10%, rgba(192,57,43,.15), transparent),
    radial-gradient(ellipse 60% 50% at 90% 90%, rgba(184,134,11,.12), transparent);
}
.hdr { text-align: center; padding: 32px 20px 18px; width: 100%; position: relative; z-index: 1; }
.hdr-logo { font-family: 'Cinzel Decorative', serif; font-size: clamp(.9rem,2.8vw,1.5rem); color: var(--gold); letter-spacing: .18em; text-shadow: 0 0 28px rgba(255,215,0,.45); }
.hdr-sub { font-size: .75rem; color: var(--gold-dim); letter-spacing: .32em; margin-top: 4px; }
.hdr-line { width: 160px; height: 1px; background: linear-gradient(90deg,transparent,var(--gold-dim),transparent); margin: 10px auto 0; }

/* ── LOGIN ── */
.login-wrap { width: 100%; max-width: 380px; padding: 40px 24px; position: relative; z-index: 1; }
.login-card { background: var(--bg3); border: 1px solid rgba(184,134,11,.28); border-radius: 14px; padding: 32px 26px; text-align: center; }
.login-title { font-size: 1.1rem; color: var(--gold); letter-spacing: .1em; margin-bottom: 20px; }
.login-err { color: var(--red-hi); font-size: .78rem; min-height: 18px; margin-bottom: 10px; }

/* ── NAV ── */
.admin-nav { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; padding: 10px 16px; position: relative; z-index: 1; }
.nb { padding: 7px 16px; border: 1px solid var(--gold-dim); background: transparent; color: var(--gold-dim); font-family: 'Noto Serif TC', serif; font-size: .82rem; cursor: pointer; border-radius: 4px; transition: all .25s; letter-spacing: .04em; }
.nb.on, .nb:hover { background: var(--gold-dim); color: var(--bg); font-weight: 700; }
.nb.exit { border-color: rgba(192,57,43,.4); color: #844; }
.nb.exit:hover { background: var(--red); color: white; border-color: var(--red); }
.a-content { flex: 1; max-width: 900px; width: 100%; margin: 0 auto; padding: 0 16px 70px; position: relative; z-index: 1; }
.tab { display: none; } .tab.on { display: block; }
.card { background: var(--bg3); border: 1px solid rgba(184,134,11,.22); border-radius: 9px; padding: 20px; margin-bottom: 14px; }
.ct { font-size: .9rem; color: var(--gold); letter-spacing: .1em; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.ct::before { content: ''; display: inline-block; width: 3px; height: 13px; background: var(--gold); border-radius: 2px; flex-shrink: 0; }
input[type=text],input[type=email],input[type=number],input[type=password],textarea { background: var(--bg2); border: 1px solid rgba(184,134,11,.28); color: var(--text); padding: 8px 12px; border-radius: 4px; font-family: 'Noto Serif TC', serif; font-size: .85rem; width: 100%; outline: none; transition: border-color .25s; }
input:focus,textarea:focus { border-color: var(--gold); }
textarea { resize: vertical; min-height: 100px; }
.row { display: flex; gap: 9px; margin-bottom: 9px; }
.row input { flex: 1; }
.btn { padding: 8px 16px; border: none; border-radius: 4px; font-family: 'Noto Serif TC', serif; font-size: .82rem; cursor: pointer; transition: all .2s; letter-spacing: .04em; }
.btn-g { background: linear-gradient(135deg,var(--gold-dim),var(--gold)); color: var(--bg); font-weight: 700; }
.btn-g:hover { filter: brightness(1.15); transform: translateY(-1px); }
.btn-r { background: var(--red); color: white; }
.btn-r:hover { background: var(--red-hi); }
.btn-o { background: transparent; border: 1px solid var(--gold-dim); color: var(--gold-dim); }
.btn-o:hover { background: rgba(184,134,11,.15); }
.btn-sm { padding: 4px 11px; font-size: .72rem; }
.rtbl { width: 100%; border-collapse: collapse; font-size: .8rem; }
.rtbl th { padding: 8px 11px; text-align: left; background: rgba(184,134,11,.1); color: var(--gold-dim); letter-spacing: .04em; border-bottom: 1px solid rgba(184,134,11,.18); }
.rtbl td { padding: 7px 11px; border-bottom: 1px solid rgba(255,255,255,.04); color: #bbb; }
.rtbl tr:hover td { background: rgba(255,255,255,.025); }
.ok { color: var(--green); font-size: .7rem; } .won-lbl { color: var(--gold); font-size: .7rem; }
.stats { display: flex; gap: 18px; margin-top: 10px; font-size: .78rem; color: var(--gold-dim); }
.stats b { color: var(--gold); }
.plist { display: flex; flex-direction: column; gap: 8px; }
.pitem { display: flex; align-items: center; gap: 8px; background: var(--bg2); border: 1px solid rgba(184,134,11,.18); padding: 10px; border-radius: 6px; }
.pnum { width: 25px; height: 25px; background: var(--gold-dim); color: var(--bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .78rem; flex-shrink: 0; }
.pitem input { flex: 1; }
.pcnt { width: 52px !important; text-align: center; }
.psel { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; }
.psb { padding: 8px 15px; border: 1px solid rgba(184,134,11,.38); background: var(--bg3); color: var(--text); font-family: 'Noto Serif TC', serif; font-size: .85rem; cursor: pointer; border-radius: 6px; transition: all .25s; }
.psb.sel { background: linear-gradient(135deg,var(--gold-dim),var(--gold)); color: var(--bg); font-weight: 700; border-color: transparent; }
.psb.done { opacity: .38; cursor: not-allowed; }
.pbadge { display: inline-block; padding: 6px 22px; background: linear-gradient(135deg,var(--red),#700); border: 1px solid rgba(255,120,120,.25); border-radius: 30px; font-size: 1rem; font-weight: 700; letter-spacing: .1em; margin-bottom: 12px; color: #FFE; }
.wi { display: flex; align-items: center; gap: 10px; padding: 8px 13px; background: linear-gradient(90deg,rgba(192,57,43,.14),transparent); border-left: 3px solid var(--red); margin-bottom: 7px; border-radius: 0 6px 6px 0; animation: slideIn .38s ease forwards; }
@keyframes slideIn { from{opacity:0;transform:translateX(-18px);}to{opacity:1;transform:translateX(0);} }
.wi-rank { font-size: .7rem; color: var(--gold-dim); min-width: 50px; }
.wi-name { font-size: 1rem; font-weight: 700; color: var(--gold); }
.wi-email { font-size: .68rem; color: #555; margin-left: 3px; }
.wi-prize { font-size: .68rem; background: rgba(184,134,11,.18); border: 1px solid var(--gold-dim); padding: 2px 8px; border-radius: 10px; color: var(--gold-dim); margin-left: auto; white-space: nowrap; }
.htitle { font-size: .78rem; color: var(--gold-dim); letter-spacing: .1em; margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid rgba(184,134,11,.18); }
.empty { text-align: center; padding: 28px; color: #444; font-size: .85rem; }
.f-label { display: block; font-size: .78rem; color: var(--gold-dim); letter-spacing: .1em; margin-bottom: 7px; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--bg3); border: 1px solid rgba(184,134,11,.3); color: var(--text); padding: 10px 22px; border-radius: 30px; font-size: .85rem; z-index: 800; transition: transform .3s, opacity .3s; opacity: 0; }
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.hidden { display: none !important; }

/* draw control status */
.status-bar { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: rgba(184,134,11,.08); border: 1px solid rgba(184,134,11,.2); border-radius: 8px; margin-bottom: 14px; font-size: .82rem; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
.status-text { color: var(--gold-dim); }
.status-text b { color: var(--gold); }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ═══ LOGIN SCREEN ═══ -->
<div id="loginScreen">
  <div class="hdr">
    <div class="hdr-logo">IM 行動教會</div>
    <div class="hdr-sub">Admin Panel · 管理後台</div>
    <div class="hdr-line"></div>
  </div>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-title">🔐 管理員登入</div>
      <div style="margin-bottom:14px">
        <input type="password" id="loginPw" placeholder="請輸入密碼" style="text-align:center;letter-spacing:.15em;padding:11px 14px;font-size:1rem" autocomplete="off">
      </div>
      <div class="login-err" id="loginErr"></div>
      <div style="display:flex;gap:9px;justify-content:center">
        <button class="btn btn-g" onclick="doLogin()" style="padding:10px 28px;font-size:.92rem">登入</button>
        <button class="btn btn-o" onclick="location.href='/'" style="padding:10px 20px;font-size:.92rem">返回</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══ ADMIN PANEL ═══ -->
<div id="adminPanel" class="hidden" style="width:100%;display:flex;flex-direction:column;align-items:center;min-height:100vh">
  <div class="hdr">
    <div class="hdr-logo">IM 行動教會 · 管理後台</div>
    <div class="hdr-sub">Admin Panel · Spring Banquet Draw</div>
    <div class="hdr-line"></div>
  </div>
  <div class="admin-nav">
    <button class="nb on" onclick="atab('reg',this)">📋 登記名單</button>
    <button class="nb" onclick="atab('prizes',this)">🎁 獎項設定</button>
    <button class="nb" onclick="atab('ctrl',this)">🎯 抽獎控制</button>
    <button class="nb" onclick="atab('hist',this)">🏆 得獎紀錄</button>
    <button class="nb" onclick="atab('pw',this)">🔑 更改密碼</button>
    <button class="nb exit" onclick="location.href='/'">← 回首頁</button>
  </div>
  <div class="a-content">

    <!-- 登記名單 -->
    <div class="tab on" id="tab-reg">
      <div class="card">
        <div class="ct">手動新增參與者</div>
        <div class="row">
          <input type="text" id="aN" placeholder="姓名（必填）">
          <button class="btn btn-g" onclick="adminAdd()">新增</button>
        </div>
        <textarea id="batch" placeholder="批次新增（一行一人）&#10;&#10;王大明&#10;李小花&#10;陳志偉"></textarea>
        <button class="btn btn-o btn-sm" style="margin-top:7px" onclick="doBatch()">批次匯入</button>
      </div>
      <div class="card">
        <div class="ct">登記名單</div>
        <div style="overflow-x:auto">
          <table class="rtbl">
            <thead><tr><th>#</th><th>姓名</th><th>狀態</th><th>操作</th></tr></thead>
            <tbody id="rtbody"><tr><td colspan="4" class="empty">尚無登記者</td></tr></tbody>
          </table>
        </div>
        <div class="stats">
          <div>總計：<b id="tC">0</b> 人</div>
          <div>可抽：<b id="aC">0</b> 人</div>
          <div>已中獎：<b id="wC">0</b> 人</div>
        </div>
        <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-o btn-sm" onclick="loadSample()">載入範例名單</button>
          <button class="btn btn-r btn-sm" onclick="clearAll()">清除全部</button>
        </div>
      </div>
    </div>

    <!-- 獎項設定 -->
    <div class="tab" id="tab-prizes">
      <div id="roundsList"></div>
      <div style="margin-top:12px;display:flex;gap:9px;flex-wrap:wrap">
        <button class="btn btn-g" onclick="addRound()">＋ 新增輪次</button>
        <button class="btn btn-o" onclick="loadDefaultRounds()">載入預設</button>
        <button class="btn btn-g" onclick="saveRounds()">💾 儲存設定</button>
      </div>
      <div class="card" style="font-size:.8rem;color:#666;line-height:1.95;margin-top:12px">
        <b style="color:var(--gold-dim)">💡 提示：</b>
        每輪可設定多個獎項。設定後請記得點「儲存設定」。
      </div>
    </div>

    <!-- 抽獎控制 -->
    <div class="tab" id="tab-ctrl">
      <div class="card">
        <div class="ct">抽獎頁面連結</div>
        <div class="status-bar">
          <div class="status-dot"></div>
          <div class="status-text">抽獎頁面：<b id="drawUrl"></b></div>
        </div>
        <div style="font-size:.78rem;color:#666">請在投影螢幕上開啟此網址，所有人可以即時看到抽獎過程。</div>
      </div>

      <div class="card">
        <div class="ct">選擇抽獎輪次</div>
        <p style="font-size:.78rem;color:#777;margin-bottom:10px">選擇輪次後，抽獎頁面會即時顯示該輪的獎項。</p>
        <div class="psel" id="rsel"></div>
      </div>

      <div class="card" id="roundStatusCard" style="display:none">
        <div class="ct">目前狀態</div>
        <div style="font-size:.88rem;color:var(--gold);text-align:center;padding:8px 0">
          已選擇：<b id="curRoundStatus"></b>
        </div>
        <div style="font-size:.78rem;color:#666;text-align:center">抽獎頁面已同步顯示此輪獎項，由抽獎頁面進行抽獎。</div>
      </div>
    </div>

    <!-- 得獎紀錄 -->
    <div class="tab" id="tab-hist">
      <div class="card">
        <div class="ct">完整得獎紀錄</div>
        <div id="histEl"><div class="empty">尚未進行抽獎</div></div>
        <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-o btn-sm" onclick="exportCSV()">📥 匯出 CSV</button>
          <button class="btn btn-r btn-sm" onclick="resetDraw()">重置抽獎紀錄</button>
        </div>
      </div>
    </div>

    <!-- 更改密碼 -->
    <div class="tab" id="tab-pw">
      <div class="card" style="max-width:400px;margin:0 auto">
        <div class="ct">更改管理員密碼</div>
        <label class="f-label" style="margin-top:10px">舊密碼</label>
        <input type="password" id="pwOld" placeholder="請輸入目前密碼" style="margin-bottom:12px">
        <label class="f-label">新密碼（至少 4 碼）</label>
        <input type="password" id="pwNew" placeholder="請輸入新密碼" style="margin-bottom:12px">
        <label class="f-label">確認新密碼</label>
        <input type="password" id="pwNew2" placeholder="再次輸入新密碼" style="margin-bottom:16px">
        <button class="btn btn-g" onclick="changePw()" style="width:100%;padding:11px;font-size:.92rem">確認更改</button>
        <div id="pwMsg" style="margin-top:10px;font-size:.82rem;min-height:20px;text-align:center"></div>
      </div>
    </div>

  </div>
</div>

<script>
/* ══ STATE ══ */
let db = { people:[], rounds:[], winners:[], activeRound:-1, activePrize:-1 };
let selRound = -1;
let loggedIn = false;

/* ══ TOAST ══ */
function toast(msg, dur=2200) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}

/* ══ API ══ */
async function api(method, path, body) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch('/api'+path, opts);
  return r.json();
}
async function reload() {
  const data = await api('GET','/data');
  db = data;
  selRound = db.activeRound !== undefined ? db.activeRound : -1;
}

/* ══ LOGIN ══ */
async function doLogin(){
  const pw=document.getElementById('loginPw').value;
  if(!pw){document.getElementById('loginErr').textContent='請輸入密碼';return;}
  const res=await api('POST','/login',{pin:pw});
  if(res.ok){ loggedIn=true; enterAdmin(); }
  else{
    document.getElementById('loginErr').textContent=res.error||'密碼錯誤';
    document.getElementById('loginPw').value='';
    document.getElementById('loginPw').focus();
  }
}
document.getElementById('loginPw').addEventListener('keydown',e=>{
  if(e.key==='Enter')doLogin();
});

/* ══ ADMIN ══ */
async function enterAdmin(){
  await reload();
  document.getElementById('loginScreen').classList.add('hidden');
  const panel=document.getElementById('adminPanel');
  panel.classList.remove('hidden');
  panel.style.display='flex';
  document.getElementById('drawUrl').textContent=location.origin+'/draw';
  renderTable(); renderRounds(); renderCtrl(); renderHist();
}

function atab(name,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('tab-'+name).classList.add('on'); btn.classList.add('on');
  if(name==='ctrl'){reload().then(()=>{renderCtrl();});}
  if(name==='hist'){reload().then(()=>{renderHist();});}
  if(name==='reg'){reload().then(()=>{renderTable();});}
}

/* ── People ── */
async function adminAdd(){
  const n=document.getElementById('aN').value.trim();
  if(!n){toast('請輸入姓名');return;}
  const res=await api('POST','/people',{name:n});
  if(res.error){toast('⚠️ '+res.error);return;}
  document.getElementById('aN').value='';
  db.people.push(res.person); renderTable(); toast('✅ 已新增 '+n);
}
async function doBatch(){
  const txt=document.getElementById('batch').value.trim();
  if(!txt)return;
  const lines=txt.split('\n').map(l=>({name:l.trim()})).filter(x=>x.name);
  const res=await api('POST','/people/batch',{lines});
  document.getElementById('batch').value='';
  await reload(); renderTable(); toast(`✅ 成功新增 ${res.added} 人`);
}
async function removePerson(i){
  await api('DELETE','/people/'+i);
  await reload(); renderTable();
}
async function loadSample(){
  const lines=['王大明','李小花','陳志偉','林美珍','張建宏','吳淑惠','劉家豪','黃雅婷','蔡俊傑','許文婷','謝宗翰','楊雅雯'].map(name=>({name}));
  const res=await api('POST','/people/batch',{lines});
  await reload(); renderTable(); toast(`✅ 範例名單已載入（新增 ${res.added} 人）`);
}
async function clearAll(){
  if(!confirm('確定清除所有人員與抽獎紀錄？'))return;
  await api('DELETE','/people');
  selRound=-1; selPrize=-1;
  await reload(); renderTable(); renderHist(); renderCtrl();
}
function renderTable(){
  const tb=document.getElementById('rtbody');
  if(!db.people.length){tb.innerHTML='<tr><td colspan="4" class="empty">尚無登記者</td></tr>';}
  else{tb.innerHTML=db.people.map((p,i)=>`<tr><td>${i+1}</td><td>${p.name}</td><td>${p.won?'<span class="won-lbl">🏆 已中獎</span>':'<span class="ok">✓ 可抽</span>'}</td><td>${p.won?'—':`<button class="btn btn-r btn-sm" onclick="removePerson(${i})">移除</button>`}</td></tr>`).join('');}
  const tot=db.people.length, w=db.people.filter(p=>p.won).length;
  document.getElementById('tC').textContent=tot;
  document.getElementById('aC').textContent=tot-w;
  document.getElementById('wC').textContent=w;
}

/* ── Rounds / Prizes Settings ── */
let _saveTimer=null;
function autoSaveRounds(){clearTimeout(_saveTimer);_saveTimer=setTimeout(()=>saveRounds(true),500);}
function addRound(){db.rounds.push({name:'第'+(db.rounds.length+1)+'輪',prizes:[]});renderRounds();autoSaveRounds();}
function delRound(ri){if(!confirm('確定刪除「'+db.rounds[ri].name+'」？'))return;db.rounds.splice(ri,1);renderRounds();autoSaveRounds();}
function addPrizeToRound(ri){db.rounds[ri].prizes.push({name:'',count:1,done:false});renderRounds();autoSaveRounds();}
function delPrize(ri,pi){db.rounds[ri].prizes.splice(pi,1);renderRounds();autoSaveRounds();}
function loadDefaultRounds(){
  db.rounds=[
    {name:'第一輪',prizes:[{name:'安慰獎',count:5,done:false}]},
    {name:'第二輪',prizes:[{name:'三獎',count:3,done:false},{name:'二獎',count:2,done:false}]},
    {name:'第三輪',prizes:[{name:'頭獎 🏆',count:1,done:false}]}
  ];renderRounds();
}
async function saveRounds(silent){
  await api('PUT','/rounds',{rounds:db.rounds});
  if(!silent) toast('✅ 設定已儲存');
}
function renderRounds(){
  const el=document.getElementById('roundsList');
  if(!db.rounds.length){el.innerHTML='<div class="card"><div class="empty">尚未設定輪次</div></div>';return;}
  el.innerHTML=db.rounds.map((r,ri)=>`<div class="card" style="margin-bottom:10px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <div class="pnum">${ri+1}</div>
      <input type="text" value="${r.name}" placeholder="輪次名稱" oninput="db.rounds[${ri}].name=this.value;autoSaveRounds()" style="flex:1;font-weight:700">
      <button class="btn btn-r btn-sm" onclick="delRound(${ri})">刪除輪次</button>
    </div>
    <div class="plist">${r.prizes.length?r.prizes.map((p,pi)=>`<div class="pitem">
      <div class="pnum" style="width:20px;height:20px;font-size:.65rem">${pi+1}</div>
      <input type="text" value="${p.name}" placeholder="獎項名稱" oninput="db.rounds[${ri}].prizes[${pi}].name=this.value;autoSaveRounds()">
      <input type="number" class="pcnt" value="${p.count}" min="1" max="99" oninput="db.rounds[${ri}].prizes[${pi}].count=parseInt(this.value)||1;autoSaveRounds()" title="抽出人數">
      <span style="font-size:.7rem;color:#555">人</span>
      <button class="btn btn-r btn-sm" onclick="delPrize(${ri},${pi})">刪除</button>
    </div>`).join(''):'<div class="empty" style="padding:6px;font-size:.78rem">此輪尚無獎項</div>'}</div>
    <button class="btn btn-o btn-sm" style="margin-top:6px" onclick="addPrizeToRound(${ri})">＋ 新增獎項</button>
  </div>`).join('');
}

/* ── Draw Control (round selector only) ── */
function renderCtrl(){
  renderRsel();
  const sc=document.getElementById('roundStatusCard');
  if(selRound<0||!db.rounds[selRound]){sc.style.display='none';return;}
  sc.style.display='block';
  document.getElementById('curRoundStatus').textContent=db.rounds[selRound].name;
}
function renderRsel(){
  const rs=document.getElementById('rsel');
  if(!db.rounds.length){rs.innerHTML='<div class="empty" style="padding:8px">請先設定並儲存輪次</div>';return;}
  rs.innerHTML=db.rounds.map((r,i)=>{
    const allDone=r.prizes.length&&r.prizes.every(p=>p.done);
    return `<button class="psb ${allDone?'done':''} ${selRound===i?'sel':''}" onclick="${allDone?'':'selectRound('+i+')'}" ${allDone?'disabled':''}>${r.name||'輪次'+(i+1)}${allDone?' ✓':''}</button>`;
  }).join('');
}
async function selectRound(i){
  selRound=i;
  await api('PUT','/active-round',{roundIndex:i});
  renderCtrl();
  toast('✅ 已切換至「'+db.rounds[i].name+'」，抽獎頁面已同步');
}

/* ── History ── */
function renderHist(){
  const h=document.getElementById('histEl');
  if(!db.winners.length){h.innerHTML='<div class="empty">尚未進行抽獎</div>';return;}
  const rgrp={};
  db.winners.forEach(w=>{
    const rn=w.roundName||'';
    if(!rgrp[rn])rgrp[rn]={};
    if(!rgrp[rn][w.prizeName])rgrp[rn][w.prizeName]=[];
    rgrp[rn][w.prizeName].push(w);
  });
  h.innerHTML=Object.entries(rgrp).map(([rn,prizes])=>`<div style="margin-bottom:20px">${rn?`<div style="font-size:.88rem;font-weight:700;color:var(--gold);margin-bottom:8px;letter-spacing:.08em">📌 ${rn}</div>`:''
  }${Object.entries(prizes).map(([pn,ws])=>`<div style="margin-bottom:12px;margin-left:${rn?'12px':'0'}"><div class="htitle">🎁 ${pn}</div>${ws.map((w,i)=>`<div class="wi"><span class="wi-rank">第 ${i+1} 位 · ${w.time}</span><span class="wi-name">🏆 ${w.name}</span><span class="wi-prize">${w.prizeName}</span></div>`).join('')}</div>`).join('')}</div>`).join('');
}
async function resetDraw(){
  if(!confirm('確定重置抽獎紀錄？（登記名單保留）'))return;
  await api('DELETE','/winners');
  selRound=-1; selPrize=-1;
  await reload(); renderTable(); renderHist(); renderCtrl();
  toast('✅ 已重置抽獎紀錄');
}
function exportCSV(){ window.location.href='/api/export'; }

/* ── Change Password ── */
async function changePw(){
  const o=document.getElementById('pwOld').value;
  const n=document.getElementById('pwNew').value;
  const n2=document.getElementById('pwNew2').value;
  const msg=document.getElementById('pwMsg');
  msg.style.color='var(--red-hi)';
  if(!o||!n||!n2){msg.textContent='請填寫所有欄位';return;}
  if(n.length<4){msg.textContent='新密碼至少 4 碼';return;}
  if(n!==n2){msg.textContent='兩次新密碼不一致';return;}
  const res=await api('PUT','/admin-pin',{oldPin:o,newPin:n});
  if(res.ok){
    msg.style.color='var(--green)';msg.textContent='密碼已更新！';
    document.getElementById('pwOld').value='';
    document.getElementById('pwNew').value='';
    document.getElementById('pwNew2').value='';
    toast('密碼更改成功');
  } else {
    msg.textContent=res.error||'更改失敗';
  }
}

/* ── INIT ── */
setTimeout(()=>document.getElementById('loginPw').focus(),100);
</script>
