<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IM 行動教會 · 春酒抽獎 · 投影</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #FFD700; --gold-dim: #B8860B; --gold-pale: #FFF5CC;
  --red: #C0392B; --red-hi: #E74C3C;
  --bg: #080810; --bg2: #10101A; --bg3: #181824;
  --text: #F0E6D0; --green: #2ECC71;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Noto Serif TC', serif;
  background: var(--bg); color: var(--text);
  display: flex; align-items: center; justify-content: center;
}
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 60% 50% at 10% 10%, rgba(192,57,43,.15), transparent),
    radial-gradient(ellipse 60% 50% at 90% 90%, rgba(184,134,11,.12), transparent);
}
#cc { position: fixed; inset: 0; pointer-events: none; z-index: 900; }
#fl { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 890; transition: opacity .1s; }

.scene { position: relative; z-index: 1; text-align: center; width: 100%; padding: 40px; }

/* ── Idle ── */
.idle-logo { font-family: 'Cinzel Decorative', serif; font-size: clamp(1.8rem,5vw,3.5rem); color: var(--gold); letter-spacing: .18em; text-shadow: 0 0 40px rgba(255,215,0,.45); }
.idle-sub { font-size: clamp(.8rem,2vw,1.2rem); color: var(--gold-dim); letter-spacing: .32em; margin-top: 10px; }
.idle-line { width: 200px; height: 1px; background: linear-gradient(90deg,transparent,var(--gold-dim),transparent); margin: 18px auto; }
.idle-wait { font-size: clamp(.85rem,1.8vw,1.1rem); color: #555; margin-top: 30px; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:.4;} 50%{opacity:1;} }

/* ── Prize badge ── */
.prize-badge { display: inline-block; padding: 10px 36px; background: linear-gradient(135deg,var(--red),#700); border: 1px solid rgba(255,120,120,.25); border-radius: 40px; font-size: clamp(1.6rem,4vw,2.8rem); font-weight: 900; letter-spacing: .12em; color: #FFE; margin-bottom: 20px; text-shadow: 0 2px 12px rgba(0,0,0,.5); }

/* ── Countdown ── */
.countdown { font-size: clamp(8rem,22vw,14rem); font-weight: 900; color: var(--gold); text-shadow: 0 0 80px rgba(255,215,0,.8); }
@keyframes cdPop { 0%{transform:scale(1.6);opacity:0;}40%{opacity:1;transform:scale(1);}80%{opacity:1;}100%{opacity:0;transform:scale(.4);} }
.cd-anim { animation: cdPop 1s ease-out forwards; }

/* ── Slot ── */
.slot-frame { background: linear-gradient(180deg,var(--bg2),rgba(16,16,26,.4)); border: 2px solid var(--gold-dim); border-radius: 16px; padding: 40px 30px; max-width: 700px; margin: 20px auto; position: relative; overflow: hidden; }
.slot-frame::before,.slot-frame::after { content: ''; position: absolute; left: 0; right: 0; height: 60px; z-index: 2; pointer-events: none; }
.slot-frame::before { top: 0; background: linear-gradient(to bottom,var(--bg2),transparent); }
.slot-frame::after { bottom: 0; background: linear-gradient(to top,var(--bg2),transparent); }
.slot-name { font-size: clamp(3rem,12vw,7rem); font-weight: 900; color: var(--gold); letter-spacing: .1em; position: relative; z-index: 3; text-shadow: 0 0 50px rgba(255,215,0,.65),0 0 100px rgba(255,215,0,.3); line-height: 1.3; }
.slot-name.rolling { animation: roll .08s steps(1) infinite; }
.slot-name.reveal { animation: revPop .6s cubic-bezier(.34,1.56,.64,1) forwards; }
@keyframes roll { 0%{transform:translateY(-4px) scale(1.03);opacity:.75;}50%{transform:translateY(4px) scale(.97);opacity:1;} }
@keyframes revPop { 0%{transform:scale(.4);opacity:0;color:white;}60%{transform:scale(1.18);}80%{transform:scale(.96);}100%{transform:scale(1);opacity:1;color:var(--gold);} }

/* ── Winner cards (multi) ── */
.winners-grid { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-top: 24px; }
.wcard { background: linear-gradient(135deg,rgba(192,57,43,.2),rgba(184,134,11,.1)); border: 1px solid rgba(255,215,0,.28); border-radius: 12px; padding: 16px 24px; text-align: center; animation: popIn .4s cubic-bezier(.34,1.56,.64,1) forwards; opacity: 0; }
@keyframes popIn { from{transform:scale(.75);opacity:0;}to{transform:scale(1);opacity:1;} }
.wcard-name { font-size: clamp(1.2rem,3vw,1.8rem); font-weight: 900; color: var(--gold); }
.wcard-num { font-size: .75rem; color: #777; margin-top: 4px; }

/* ── Info line ── */
.info { font-size: clamp(.75rem,1.5vw,.95rem); color: #555; margin-top: 16px; }

.hidden { display: none; }
</style>
</head>
<body>

<canvas id="cc"></canvas>
<div id="fl"></div>

<div class="scene">
  <!-- Idle -->
  <div id="v-idle">
    <div class="idle-logo">IM 行動教會</div>
    <div class="idle-sub">Spring Banquet · 春酒晚宴</div>
    <div class="idle-line"></div>
    <div style="font-size:5rem;margin:20px 0">🎊</div>
    <div class="idle-wait">等待抽獎開始...</div>
  </div>

  <!-- Draw area (hidden until draw starts) -->
  <div id="v-draw" class="hidden">
    <div class="prize-badge" id="dPrize"></div>
    <div id="dCountdown" class="hidden"></div>
    <div id="dSlot" class="hidden">
      <div class="slot-frame">
        <div class="slot-name" id="dName">？</div>
      </div>
    </div>
    <div class="winners-grid hidden" id="dWinners"></div>
    <div class="info" id="dInfo"></div>
  </div>
</div>

<script>
/* ══ CONFETTI ══ */
const cc=document.getElementById('cc'),cx=cc.getContext('2d');
let bits=[],animOn=false;
const resize=()=>{cc.width=innerWidth;cc.height=innerHeight;};
resize();addEventListener('resize',resize);
function burst(){
  const cols=['#FFD700','#FF4444','#FF8C00','#FF1493','#FFFFFF'];
  for(let i=0;i<200;i++)bits.push({x:Math.random()*cc.width,y:-5-Math.random()*80,w:6+Math.random()*10,h:10+Math.random()*11,c:cols[~~(Math.random()*cols.length)],vx:(Math.random()-.5)*6,vy:3+Math.random()*6,vr:(Math.random()-.5)*.2,r:Math.random()*Math.PI*2,a:1});
  if(!animOn)animConf();
}
function animConf(){
  animOn=true;cx.clearRect(0,0,cc.width,cc.height);
  bits=bits.filter(b=>b.a>.04);
  bits.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.r+=b.vr;if(b.y>cc.height*.65)b.a-=.022;cx.save();cx.globalAlpha=b.a;cx.translate(b.x,b.y);cx.rotate(b.r);cx.fillStyle=b.c;cx.fillRect(-b.w/2,-b.h/2,b.w,b.h);cx.restore();});
  if(bits.length)requestAnimationFrame(animConf);
  else{animOn=false;cx.clearRect(0,0,cc.width,cc.height);}
}
const flash=()=>{const f=document.getElementById('fl');f.style.opacity='.55';setTimeout(()=>f.style.opacity='0',110);};

/* ══ AUDIO ══ */
const AC=window.AudioContext||window.webkitAudioContext;
let ac=null;
const aud=()=>{if(!ac)ac=new AC();return ac;};
const tone=(f,d,t='sine',v=.08)=>{try{const c=aud(),o=c.createOscillator(),g=c.createGain();o.type=t;o.frequency.value=f;o.connect(g);g.connect(c.destination);g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}};
const playTick=()=>tone(600+Math.random()*600,.05,'square',.04);
const playBeep=n=>tone(n===1?900:440,.28);
const playReveal=()=>[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.45,'triangle',.12),i*100));

/* ══ ELEMENTS ══ */
const $=id=>document.getElementById(id);
const vIdle=$('v-idle'), vDraw=$('v-draw');
const dPrize=$('dPrize'), dCountdown=$('dCountdown'), dSlot=$('dSlot');
const dName=$('dName'), dWinners=$('dWinners'), dInfo=$('dInfo');

let revealedWinners = [];

/* ══ SSE ══ */
const es = new EventSource('/api/events');

es.addEventListener('draw-start', e => {
  const {prizeName, count} = JSON.parse(e.data);
  revealedWinners = [];

  // Show draw view
  vIdle.classList.add('hidden');
  vDraw.classList.remove('hidden');
  dPrize.textContent = prizeName;
  dWinners.classList.add('hidden');
  dWinners.innerHTML = '';
  dInfo.textContent = `本獎項抽出 ${count} 位`;

  // Countdown
  dCountdown.classList.remove('hidden');
  dSlot.classList.add('hidden');
  let n = 3;
  showCD(n);
  const iv = setInterval(() => {
    n--;
    if (n > 0) { showCD(n); }
    else {
      clearInterval(iv);
      dCountdown.classList.add('hidden');
      dSlot.classList.remove('hidden');
      dName.textContent = '？';
      dName.className = 'slot-name';
    }
  }, 1000);
});

function showCD(n) {
  dCountdown.innerHTML = `<div class="countdown cd-anim">${n}</div>`;
  playBeep(n);
}

es.addEventListener('draw-rolling', e => {
  const {name} = JSON.parse(e.data);
  dName.textContent = name;
  dName.className = 'slot-name rolling';
  playTick();
});

es.addEventListener('draw-reveal-one', e => {
  const {name, index, total, prizeName} = JSON.parse(e.data);
  // Reveal in slot
  dName.className = 'slot-name';
  dName.textContent = name;
  dName.className = 'slot-name reveal';
  flash(); playReveal(); burst();

  // Add card
  dWinners.classList.remove('hidden');
  const card = document.createElement('div');
  card.className = 'wcard';
  card.style.animationDelay = '0s';
  card.innerHTML = `<div class="wcard-name">${name}</div><div class="wcard-num">#${index+1}</div>`;
  dWinners.appendChild(card);
  revealedWinners.push(name);
});

es.addEventListener('draw-result', e => {
  const {winners, prizeName} = JSON.parse(e.data);
  dSlot.classList.remove('hidden');

  if (winners.length === 1) {
    // Single winner - show big reveal
    dName.className = 'slot-name';
    dName.textContent = winners[0];
    dName.className = 'slot-name reveal';
    flash(); playReveal(); burst();
    setTimeout(() => burst(), 300);
  } else if (revealedWinners.length === 0) {
    // All at once fallback
    dName.className = 'slot-name';
    dName.textContent = winners[0];
    dName.className = 'slot-name reveal';
    flash(); burst();
    dWinners.classList.remove('hidden');
    dWinners.innerHTML = winners.map((w,i) =>
      `<div class="wcard" style="animation-delay:${i*.1}s"><div class="wcard-name">${w}</div><div class="wcard-num">#${i+1}</div></div>`
    ).join('');
  }
  // Final burst
  setTimeout(() => burst(), 500);
  dInfo.textContent = `🏆 ${prizeName} — 恭喜得獎！`;
});

// Init audio on first click (browser autoplay policy)
document.addEventListener('click', () => { try { aud(); } catch(e) {} }, { once: true });
</script>
</body>
</html>
