<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IM 行動教會 · 春酒抽獎</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #FFD700; --gold-dim: #B8860B; --gold-pale: #FFF5CC;
  --red: #C0392B; --red-hi: #E74C3C;
  --bg: #080810; --bg2: #10101A; --bg3: #181824;
  --text: #F0E6D0; --muted: #7A6A50;
  --green: #2ECC71;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Noto Serif TC', serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
  display: flex; flex-direction: column; align-items: center;
}
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 60% 50% at 10% 10%, rgba(192,57,43,.15), transparent),
    radial-gradient(ellipse 60% 50% at 90% 90%, rgba(184,134,11,.12), transparent);
}
.hdr { text-align: center; padding: 32px 20px 18px; width: 100%; position: relative; z-index: 1; }
.hdr-logo { font-family: 'Cinzel Decorative', serif; font-size: clamp(.9rem,2.8vw,1.5rem); color: var(--gold); letter-spacing: .18em; text-shadow: 0 0 28px rgba(255,215,0,.45); }
.hdr-sub { font-size: .75rem; color: var(--gold-dim); letter-spacing: .32em; margin-top: 4px; }
.hdr-line { width: 160px; height: 1px; background: linear-gradient(90deg,transparent,var(--gold-dim),transparent); margin: 10px auto 0; }
.reg-wrap { width: 100%; max-width: 500px; padding: 0 24px 80px; position: relative; z-index: 1; }
.reg-hero { text-align: center; margin-bottom: 26px; }
.reg-emoji { font-size: 3.8rem; display: block; margin-bottom: 10px; }
.reg-title { font-size: 1.65rem; font-weight: 900; color: var(--gold); }
.reg-desc { font-size: .88rem; color: #999; margin-top: 7px; line-height: 1.75; }
.reg-card { background: var(--bg3); border: 1px solid rgba(184,134,11,.28); border-radius: 14px; padding: 28px 26px; box-shadow: 0 10px 50px rgba(0,0,0,.45); }
.f-label { display: block; font-size: .78rem; color: var(--gold-dim); letter-spacing: .1em; margin-bottom: 7px; }
.f-label em { color: var(--red-hi); font-style: normal; }
.f-input { display: block; width: 100%; background: var(--bg2); border: 1.5px solid rgba(184,134,11,.22); color: var(--text); padding: 13px 15px; border-radius: 8px; font-family: 'Noto Serif TC', serif; font-size: .98rem; outline: none; transition: border-color .25s, box-shadow .25s; margin-bottom: 18px; }
.f-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(255,215,0,.1); }
.f-input.err { border-color: var(--red-hi); }
.reg-submit { width: 100%; padding: 15px; border: none; border-radius: 8px; background: linear-gradient(135deg,#7B0000,var(--red-hi)); color: #FFF5CC; font-family: 'Noto Serif TC', serif; font-size: 1rem; font-weight: 700; letter-spacing: .18em; cursor: pointer; transition: all .22s; box-shadow: 0 4px 22px rgba(231,76,60,.35); position: relative; overflow: hidden; }
.reg-submit::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg,rgba(255,255,255,.1),transparent); border-radius: inherit; }
.reg-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(231,76,60,.55); }
.reg-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; }
.reg-tally { text-align: center; margin-top: 16px; font-size: .8rem; color: #555; }
.reg-tally b { color: var(--gold); }
.success-veil { position: fixed; inset: 0; z-index: 500; background: rgba(8,8,16,.92); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .3s; }
.success-veil.on { opacity: 1; pointer-events: all; }
.success-box { text-align: center; transform: scale(.7); transition: transform .4s cubic-bezier(.34,1.56,.64,1); }
.success-veil.on .success-box { transform: scale(1); }
.s-icon { font-size: 5rem; margin-bottom: 14px; display: block; }
.s-name { font-size: 2.2rem; font-weight: 900; color: var(--gold); }
.s-msg { color: #aaa; margin-top: 8px; font-size: .95rem; }
.unlock-btn { position: fixed; bottom: 18px; right: 18px; z-index: 100; background: rgba(16,16,26,.85); border: 1px solid rgba(184,134,11,.18); color: #444; padding: 7px 13px; border-radius: 8px; font-size: .72rem; cursor: pointer; font-family: 'Noto Serif TC', serif; transition: all .3s; }
.unlock-btn:hover { color: var(--gold-dim); border-color: rgba(184,134,11,.45); }
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.78); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 600; }
.modal-bg.open { display: flex; }
.pin-box { background: var(--bg3); border: 1px solid rgba(184,134,11,.32); border-radius: 14px; padding: 32px 26px; width: 310px; text-align: center; animation: popIn .3s cubic-bezier(.34,1.56,.64,1); }
@keyframes popIn { from{transform:scale(.75);opacity:0;}to{transform:scale(1);opacity:1;} }
.pin-title { font-size: 1rem; color: var(--gold); letter-spacing: .1em; margin-bottom: 20px; }
.pin-err { color: var(--red-hi); font-size: .78rem; min-height: 18px; margin-bottom: 10px; }
.btn { padding: 8px 16px; border: none; border-radius: 4px; font-family: 'Noto Serif TC', serif; font-size: .82rem; cursor: pointer; transition: all .2s; letter-spacing: .04em; }
.btn-g { background: linear-gradient(135deg,var(--gold-dim),var(--gold)); color: var(--bg); font-weight: 700; }
.btn-g:hover { filter: brightness(1.15); transform: translateY(-1px); }
.btn-o { background: transparent; border: 1px solid var(--gold-dim); color: var(--gold-dim); }
.btn-o:hover { background: rgba(184,134,11,.15); }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--bg3); border: 1px solid rgba(184,134,11,.3); color: var(--text); padding: 10px 22px; border-radius: 30px; font-size: .85rem; z-index: 800; transition: transform .3s, opacity .3s; opacity: 0; }
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
#cc { position: fixed; inset: 0; pointer-events: none; z-index: 900; }
</style>
</head>
<body>

<canvas id="cc"></canvas>
<div class="toast" id="toast"></div>

<div class="hdr">
  <div class="hdr-logo">IM 行動教會</div>
  <div class="hdr-sub">Spring Banquet · 春酒晚宴</div>
  <div class="hdr-line"></div>
</div>
<div class="reg-wrap">
  <div class="reg-hero">
    <span class="reg-emoji">🎊</span>
    <div class="reg-title">歡迎登記抽獎！</div>
    <p class="reg-desc">請填寫您的姓名<br>完成登記後即可參加今晚的幸運抽獎 🎁</p>
  </div>
  <div class="reg-card">
    <label class="f-label" for="rName">姓　名 <em>*</em></label>
    <input class="f-input" type="text" id="rName" placeholder="請輸入您的姓名" autocomplete="off">
    <button class="reg-submit" id="regBtn" onclick="doRegister()">確認登記，加入抽獎 🎉</button>
  </div>
  <div class="reg-tally">目前已有 <b id="regCnt">0</b> 位會友完成登記</div>
</div>

<div class="success-veil" id="sv">
  <div class="success-box">
    <span class="s-icon">🎉</span>
    <div class="s-name" id="sName"></div>
    <div class="s-msg">登記成功！今晚祝您好運 ✨</div>
  </div>
</div>

<div class="modal-bg" id="pinModal">
  <div class="pin-box">
    <div class="pin-title">🔐 管理員驗證</div>
    <div style="margin-bottom:14px">
      <input type="password" id="loginPw" placeholder="請輸入密碼" style="width:100%;padding:11px 14px;background:var(--bg2);border:1.5px solid rgba(184,134,11,.28);color:var(--text);border-radius:8px;font-family:'Noto Serif TC',serif;font-size:1rem;outline:none;text-align:center;letter-spacing:.15em" autocomplete="off">
    </div>
    <div class="pin-err" id="pinErr"></div>
    <div style="display:flex;gap:9px;justify-content:center">
      <button class="btn btn-g" onclick="doLogin()" style="padding:10px 28px;font-size:.92rem">登入</button>
      <button class="btn btn-o" onclick="closePin()" style="padding:10px 20px;font-size:.92rem">取消</button>
    </div>
  </div>
</div>

<button class="unlock-btn" onclick="openPin()">⚙ 管理員</button>

<script>
function toast(msg, dur=2200) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}

async function api(method, path, body) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch('/api'+path, opts);
  return r.json();
}

/* ── CONFETTI ── */
const cc=document.getElementById('cc'),cx=cc.getContext('2d');
let bits=[],animOn=false;
const resize=()=>{cc.width=innerWidth;cc.height=innerHeight;};
resize();addEventListener('resize',resize);
function burst(){
  const cols=['#FFD700','#FF4444','#FF8C00','#FF1493','#FFFFFF'];
  for(let i=0;i<160;i++)bits.push({x:Math.random()*cc.width,y:-5-Math.random()*80,w:5+Math.random()*8,h:8+Math.random()*9,c:cols[~~(Math.random()*cols.length)],vx:(Math.random()-.5)*5,vy:3+Math.random()*5,vr:(Math.random()-.5)*.2,r:Math.random()*Math.PI*2,a:1});
  if(!animOn)animConf();
}
function animConf(){
  animOn=true;cx.clearRect(0,0,cc.width,cc.height);
  bits=bits.filter(b=>b.a>.04);
  bits.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.r+=b.vr;if(b.y>cc.height*.65)b.a-=.022;cx.save();cx.globalAlpha=b.a;cx.translate(b.x,b.y);cx.rotate(b.r);cx.fillStyle=b.c;cx.fillRect(-b.w/2,-b.h/2,b.w,b.h);cx.restore();});
  if(bits.length)requestAnimationFrame(animConf);
  else{animOn=false;cx.clearRect(0,0,cc.width,cc.height);}
}

/* ── AUDIO ── */
const AC = window.AudioContext||window.webkitAudioContext;
let ac=null;
const aud=()=>{if(!ac)ac=new AC();return ac;};
const tone=(f,d,t='sine',v=.08)=>{try{const c=aud(),o=c.createOscillator(),g=c.createGain();o.type=t;o.frequency.value=f;o.connect(g);g.connect(c.destination);g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}};
const playSuccess=()=>[440,550,660].forEach((f,i)=>setTimeout(()=>tone(f,.35,'sine',.1),i*80));

/* ── REGISTRATION ── */
async function doRegister() {
  const nE=document.getElementById('rName');
  const n=nE.value.trim();
  nE.classList.remove('err');
  if(!n){nE.classList.add('err');nE.focus();return;}
  const btn=document.getElementById('regBtn');
  btn.disabled=true; btn.textContent='登記中...';
  const res = await api('POST','/people',{name:n});
  btn.disabled=false; btn.textContent='確認登記，加入抽獎 🎉';
  if(res.error){
    nE.classList.add('err'); toast('⚠️ '+res.error); return;
  }
  nE.value=''; nE.focus();
  document.getElementById('regCnt').textContent = res.total;
  document.getElementById('sName').textContent = n+'，歡迎！';
  const v=document.getElementById('sv');
  v.classList.add('on'); playSuccess(); burst();
  setTimeout(()=>v.classList.remove('on'),2300);
}
document.getElementById('rName').addEventListener('keydown',e=>{if(e.key==='Enter')doRegister();});

/* ── LOGIN ── */
function openPin(){
  document.getElementById('loginPw').value='';
  document.getElementById('pinErr').textContent='';
  document.getElementById('pinModal').classList.add('open');
  setTimeout(()=>document.getElementById('loginPw').focus(),100);
}
function closePin(){
  document.getElementById('loginPw').value='';
  document.getElementById('pinModal').classList.remove('open');
}
async function doLogin(){
  const pw=document.getElementById('loginPw').value;
  if(!pw){document.getElementById('pinErr').textContent='請輸入密碼';return;}
  const res=await api('POST','/login',{pin:pw});
  if(res.ok){ window.location.href='/admin'; }
  else{
    document.getElementById('pinErr').textContent=res.error||'密碼錯誤';
    document.getElementById('loginPw').value='';
    document.getElementById('loginPw').focus();
  }
}
document.getElementById('loginPw').addEventListener('keydown',e=>{
  if(e.key==='Enter')doLogin();
  if(e.key==='Escape')closePin();
});

/* ── INIT ── */
(async()=>{
  const data=await api('GET','/data');
  document.getElementById('regCnt').textContent=data.people.length;
})();
</script>
</body>
</html>
